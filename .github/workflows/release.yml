name: Release
on:
  push: { tags: ["v*"] }
  workflow_dispatch:
permissions: { contents: write }
jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            suffix: ""
            asset: todo-cli-rs-linux-x86_64
          - os: macos-latest
            suffix: ""
            asset: todo-cli-rs-macos-x86_64
          - os: windows-latest
            suffix: .exe
            asset: todo-cli-rs-windows-x86_64.exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - run: cargo build --release
      - run: mv target/release/todo-cli-rs${{ matrix.suffix }} ${{ matrix.asset }}
      - uses: softprops/action-gh-release@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: ${{ matrix.asset }}
